services:
  redis:
    image: redis:7-alpine
    container_name: elearning-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

# File storage is hosted on Cloudflare R2 (S3-compatible) — see R2_* in apps/backend/.env
